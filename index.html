<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Recherche GPS NEWCOM</title>
<style>
    body { font-family: Arial; padding: 20px; }
    input { width: 300px; padding: 10px; font-size: 16px; }
    button { padding: 10px 20px; font-size: 16px; }
</style>
</head>
<body>

<h2>Recherche de site NEWCOM</h2>
<input type="text" id="search" placeholder="Ex : 050BNO">
<button onclick="searchSite()">Rechercher</button>

<script>
// Fonction pour lire le CSV
async function loadCSV() {
    try {
        const response = await fetch('sites.csv');
        if (!response.ok) {
            alert("Erreur de chargement du fichier sites.csv : " + response.status);
            return [];
        }

        const text = await response.text();
        const rows = text.split('\n').map(r => r.trim()).filter(r => r.length > 0);

        // DEBUG : combien de lignes ?
        alert("CSV chargé, lignes : " + rows.length);

        const data = rows.slice(1).map(row => {
            const [code, lat, lng] = row.split(';'); // on lit bien les ;
            return { code: code.trim(), lat: lat.trim(), lng: lng.trim() };
        });

        // DEBUG : première ligne
        if (data.length > 0) {
            alert("Premier code : " + data[0].code);
        }

        return data;
    } catch (e) {
        alert("Erreur JS : " + e.message);
        return [];
    }
}

async function searchSite() {
    const query = document.getElementById('search').value.trim().toUpperCase();
    const data = await loadCSV();

    if (!data || data.length === 0) {
        alert("Aucune donnée chargée depuis sites.csv");
        return;
    }

    const result = data.find(item => item.code.toUpperCase() === query);

    if (!result) {
        alert("Code introuvable dans le CSV : " + query);
        return;
    }

    const url = `https://www.google.com/maps?q=${result.lat},${result.lng}`;
    window.open(url, "_blank");
}
</script>

</body>
</html>
