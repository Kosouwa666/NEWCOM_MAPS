<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Recherche GPS NEWCOM</title>
<style>
    body { font-family: Arial; padding: 20px; }
    input { width: 300px; padding: 10px; font-size: 16px; }
    button { padding: 10px 20px; font-size: 16px; }
</style>
</head>
<body>

<h2>Recherche de site NEWCOM</h2>
<input type="text" id="search" placeholder="Ex : 050BNO">
<button onclick="searchSite()">Chercher</button>

<!-- Zone où les icônes vont s'afficher -->
<div id="result" style="margin-top:20px;"></div>

<script>
async function searchSite() {
    const query = document.getElementById('search').value.trim().toUpperCase();
    const data = await loadCSV();

    const result = data.find(item => item.code.toUpperCase() === query);

    if (!result) {
        alert("Code introuvable");
        return;
    }

    // URLs pour ouvrir les apps
    const mapsUrl = `https://www.google.com/maps?q=${result.lat},${result.lng}`;
    const wazeUrl = `https://waze.com/ul?ll=${result.lat},${result.lng}&navigate=yes`;

    // Affichage des icônes
    document.getElementById("result").innerHTML = `
        <p>Choisir l'application :</p>

        <a href="${mapsUrl}" target="_blank" style="margin-right:20px;">
            <img src="https://upload.wikimedia.org/wikipedia/commons/9/99/Google_Maps_Logo.svg" width="60">
        </a>

        <a href="${wazeUrl}" target="_blank">
            <img src="https://upload.wikimedia.org/wikipedia/commons/3/3e/Waze_logo.svg" width="60">
        </a>
    `;
}
</script>

</body>
</html>
