<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>MAPS TELECOM</title>
<style>
    body { font-family: Arial; padding: 20px; }

    input { width: 300px; padding: 10px; font-size: 16px; }
    button { padding: 10px 20px; font-size: 16px; margin-left: 10px; }

    #result a { 
        display: inline-block; 
        margin-right: 20px; 
        margin-top: 10px; 
        padding: 12px 18px; 
        background: #eee; 
        border-radius: 6px; 
        text-decoration: none; 
        color: #000;
        font-weight: bold;
        font-size: 16px;
    }

    #suggestions {
        border: 1px solid #ccc;
        width: 300px;
        display: none;
        position: absolute;
        background: white;
        z-index: 10;
        font-size: 16px;
    }
    #suggestions div {
        padding: 8px;
        cursor: pointer;
    }
    #suggestions div:hover {
        background: #f0f0f0;
    }

    .search-container {
        display: flex;
        align-items: flex-start;
        position: relative;
    }
</style>
</head>
<body>

<h2>Recherche de site</h2>

<div class="search-container">
    <div style="position:relative;">
        <input type="text" id="search" placeholder="Ex : 050BNO">
        <div id="suggestions"></div>
    </div>

    <button onclick="searchSite()">Chercher</button>
</div>

<div id="result" style="margin-top:20px;"></div>

<script>
// Empêche Enter de lancer Maps
document.getElementById("search").addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        e.preventDefault();
        searchSite();
    }
});

// Lecture du CSV (robuste)
async function loadCSV() {
    const response = await fetch('sites.csv');
    const text = await response.text();

    return text
        .split('\n')
        .map(r => r.trim())
        .filter(r => r.length > 0)
        .slice(1)
        .map(row => {
            const parts = row.split(';').map(x => x.trim());
            return { code: parts[0], lat: parts[1], lng: parts[2] };
        });
}

// AUTO-COMPLÉTION (recherche partielle)
document.getElementById("search").addEventListener("input", async function() {
    const query = this.value.trim().toUpperCase();
    const suggestionsBox = document.getElementById("suggestions");

    if (query.length < 2) {
        suggestionsBox.style.display = "none";
        return;
    }

    const data = await loadCSV();
    const matches = data.filter(item => item.code.includes(query));

    if (matches.length === 0) {
        suggestionsBox.style.display = "none";
        return;
    }

    suggestionsBox.innerHTML = matches
        .map(item => `<div onclick="selectSuggestion('${item.code}')">${item.code}</div>`)
        .join("");

    suggestionsBox.style.display = "block";
});

// Sélection d’une suggestion
function selectSuggestion(code) {
    document.getElementById("search").value = code;
    document.getElementById("suggestions").style.display = "none";
    searchSite();
}

// RECHERCHE (partielle + exacte)
async function searchSite() {
    const query = document.getElementById('search').value.trim().toUpperCase();
    const data = await loadCSV();

    // 1) Recherche exacte
    const exact = data.find(item => item.code === query);

    if (exact) {
        openMaps(exact);
        return;
    }

    // 2) Recherche partielle
    const matches = data.filter(item => item.code.includes(query));

    if (matches.length === 0) {
        document.getElementById("result").innerHTML = "<p>Aucun site trouvé.</p>";
        return;
    }

    // Affichage liste des résultats
    document.getElementById("result").innerHTML =
        "<p>Résultats :</p>" +
        matches.map(item =>
            `<div style="margin:8px 0;">
                <a href="#" onclick="openMaps({lat:'${item.lat}',lng:'${item.lng}'})">
                    ${item.code}
                </a>
            </div>`
        ).join("");
}

// Ouvre Maps/Waze
function openMaps(item) {
    const mapsUrl = `https://www.google.com/maps?q=${item.lat},${item.lng}`;
    const wazeUrl = `https://waze.com/ul?ll=${item.lat},${item.lng}&navigate=yes`;

    document.getElementById("result").innerHTML = `
        <p>Choisir l'application :</p>
        <a href="${mapsUrl}" target="_blank" style="background:#4285F4;color:white;">
            Google Maps
        </a>
        <a href="${wazeUrl}" target="_blank" style="background:#1C9CEA;color:white;">
            Waze
        </a>
    `;
}
</script>

</body>
</html>
