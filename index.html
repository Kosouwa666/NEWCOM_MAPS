<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Recherche GPS NEWCOM</title>
<style>
    body { font-family: Arial; padding: 20px; }
    input { width: 300px; padding: 10px; font-size: 16px; }
    button { padding: 10px 20px; font-size: 16px; margin-left: 10px; }

    #result a { 
        display: inline-block; 
        margin-right: 20px; 
        margin-top: 10px; 
        padding: 12px 18px; 
        background: #eee; 
        border-radius: 6px; 
        text-decoration: none; 
        color: #000;
        font-weight: bold;
    }

    /* Style du menu déroulant */
    #suggestions {
        border: 1px solid #ccc;
        width: 300px;
        display: none;
        position: absolute;
        background: white;
        z-index: 10;
    }
    #suggestions div {
        padding: 8px;
        cursor: pointer;
    }
    #suggestions div:hover {
        background: #f0f0f0;
    }

    /* Conteneur horizontal */
    .search-container {
        display: flex;
        align-items: flex-start;
        position: relative;
    }
</style>
</head>
<body>

<h2>Recherche de site</h2>

<div class="search-container">
    <div style="position:relative;">
        <input type="text" id="search" placeholder="Ex : 050BNO">
        <div id="suggestions"></div>
    </div>

    <button onclick="searchSite()">Chercher</button>
</div>

<div id="result" style="margin-top:20px;"></div>

<script>
// Empêche la touche Entrée d'ouvrir automatiquement Maps
document.getElementById("search").addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        e.preventDefault();
        searchSite();
    }
});

// Lecture du CSV
async function loadCSV() {
    const response = await fetch('sites.csv');
    const text = await response.text();
    const rows = text.split('\n').map(r => r.trim()).filter(r => r.length > 0);

    const data = rows.slice(1).map(row => {
        const [code, lat, lng] = row.split(';');
        return { code: code.trim(), lat: lat.trim(), lng: lng.trim() };
    });

    return data;
}

// AUTO-COMPLÉTION
document.getElementById("search").addEventListener("input", async function() {
    const query = this.value.trim().toUpperCase();
    const suggestionsBox = document.getElementById("suggestions");

    if (query.length < 2) {
        suggestionsBox.style.display = "none";
        return;
    }

    const data = await loadCSV();
    const matches = data.filter(item => item.code.includes(query));

    if (matches.length === 0) {
        suggestionsBox.style.display = "none";
        return;
    }

    suggestionsBox.innerHTML = matches
        .map(item => `<div onclick="selectSuggestion('${item.code}')">${item.code}</div>`)
        .join("");

    suggestionsBox.style.display = "block";
});

// Quand on clique sur une suggestion
function selectSuggestion(code) {
    document.getElementById("search").value = code;
    document.getElementById("suggestions").style.display = "none";
}

// Recherche + affichage des boutons
async function searchSite() {
    const query = document.getElementById('search').value.trim().toUpperCase();
    const data = await loadCSV();

    const result = data.find(item => item.code.toUpperCase() === query);

    if (!result) {
        alert("Code introuvable");
        document.getElementById("result").innerHTML = "";
        return;
    }

    const mapsUrl = `https://www.google.com/maps?q=${result.lat},${result.lng}`;
    const wazeUrl = `https://waze.com/ul?ll=${result.lat},${result.lng}&navigate=yes`;

    document.getElementById("result").innerHTML = `
        <p>Choisir l'application :</p>
        <a href="${mapsUrl}" target="_blank" style="background:#4285F4;color:white;">
            Ouvrir dans Google Maps
        </a>
        <a href="${wazeUrl}" target="_blank" style="background:#1C9CEA;color:white;">
            Ouvrir dans Waze
        </a>
    `;
}
</script>

</body>
</html>
